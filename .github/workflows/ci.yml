name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
  workflow_call:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:

  changes:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    permissions:
      contents: read
      pull-requests: read
    outputs:
      # On tag pushes (`refs/tags/v*`) we ALWAYS run the full pipeline —
      # otherwise dorny/paths-filter compares tag commit vs main HEAD and
      # returns code=false when they're the same SHA, skipping the whole
      # chain including `docker`. The `||` short-circuits to the filter
      # result for non-tag events.
      code: ${{ startsWith(github.ref, 'refs/tags/') && 'true' || steps.filter.outputs.code }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - id: filter
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        with:
          base: ${{ github.event_name == 'push' && 'main' || '' }}
          filters: |
            code:
              - '!(**.md|docs/**|specs/**|LICENSE|.gitignore|.claudeignore|.claude/**|benchmarks/**|**.png|**.jpg|**.gif|**.svg)'
              - 'CLAUDE.md'
              - 'docs/diagrams/**/*.puml'

  static-check:
    needs: [changes]
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
      - name: Static check
        run: make static-check

  build:
    needs: [changes, static-check]
    if: ${{ !failure() && !cancelled() && needs.changes.outputs.code == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: 'read-values/go.mod'
          cache: true
          cache-dependency-path: |
            read-values/go.sum
            state/frontendsvc/go.sum
            subscriber/go.sum
            write-values/go.sum
      - name: Build
        run: make build
      - name: Build image
        run: make image-build

  test:
    needs: [changes, static-check]
    if: ${{ !failure() && !cancelled() && needs.changes.outputs.code == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: 'read-values/go.mod'
          cache: true
          cache-dependency-path: |
            read-values/go.sum
            state/frontendsvc/go.sum
            subscriber/go.sum
            write-values/go.sum
      - name: Test
        run: make test

  integration-test:
    needs: [changes, static-check]
    if: ${{ !failure() && !cancelled() && needs.changes.outputs.code == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: 'read-values/go.mod'
          cache: true
          cache-dependency-path: |
            read-values/go.sum
            state/frontendsvc/go.sum
            subscriber/go.sum
            write-values/go.sum
      # Uses Testcontainers Redis to validate the JSON wire-format roundtrip
      # and the cross-service contract.
      - name: Integration test
        run: make integration-test

  e2e:
    needs: [changes, build, test]
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
      # Installs cloud-provider-kind plus lint/vuln toolchain via `go install`.
      - name: Install dependencies
        run: make deps
      # Brings up KinD, Dapr control plane, Dapr components, and the four
      # service workloads (kind-up → deploy-dapr → deploy-components → deploy-workloads).
      - name: Bring up KinD cluster and workloads
        run: make kind-deploy
      - name: Run e2e
        run: make e2e
      - name: Diagnostic dump on failure
        if: failure()
        run: |
          kubectl --context kind-dapr-go -n dapr-go get all
          kubectl --context kind-dapr-go -n dapr-go describe pods
          kubectl --context kind-dapr-go -n dapr-go logs deployment/subscriber --tail=100 || true
          kubectl --context kind-dapr-go -n dapr-go logs deployment/write-values --tail=100 || true
          kubectl --context kind-dapr-go -n dapr-go logs deployment/read-values --tail=100 || true
      - name: Tear down cluster
        if: always()
        run: make kind-down

  image-test:
    # Dockerfile-contract assertions (container-structure-test): USER 10001,
    # /app/main present + owned by app:app, ENTRYPOINT. Orthogonal to the Trivy
    # image scan (CVEs) and the docker job's smoke test (runtime boot). Runs on
    # every code change (NOT tag-gated) so contract drift blocks the merge.
    needs: [changes, build, test]
    if: ${{ !failure() && !cancelled() && (needs.changes.outputs.code == 'true' || startsWith(github.ref, 'refs/tags/')) }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
      - name: Install dependencies
        run: make deps
      - name: Image-contract assertions (container-structure-test)
        run: make image-test

  docker:
    # Tag-gated: builds + scans + signs + publishes images to GHCR on `v*` tags only.
    # Requires e2e to have actually SUCCEEDED (not merely skipped) — this is a
    # release-signing job, so !failure()/!cancelled() alone (which treats a
    # skipped need as pass-equivalent) is not strict enough here.
    if: ${{ !failure() && !cancelled() && needs.e2e.result == 'success' && startsWith(github.ref, 'refs/tags/') }}
    needs: [changes, build, test, integration-test, e2e]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write          # GHCR push
      id-token: write          # cosign keyless OIDC (Sigstore Fulcio)
    strategy:
      fail-fast: false
      matrix:
        include:
          - { name: read-values,  dir: read-values }
          - { name: write-values, dir: write-values }
          - { name: subscriber,   dir: subscriber }
          - { name: frontendsvc,  dir: state/frontendsvc }
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4.0.0
      - uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        with:
          images: ghcr.io/${{ github.repository }}/${{ matrix.name }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
          flavor: |
            latest=true

      # GATE 1: Build single-arch image into the local Docker daemon for scanning + smoke.
      - name: Build image for scan
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: ./${{ matrix.dir }}
          platforms: linux/amd64
          load: true
          tags: dapr-go-${{ matrix.name }}:scan
          # Bust the `apk --no-cache upgrade` layer per run so the scanned
          # image reflects the latest alpine:3.23 security patches, not a
          # stale gha-cached layer.
          build-args: |
            APK_UPGRADE_BUST=${{ github.run_id }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # GATE 2: Trivy image scan — CRITICAL/HIGH (fixed) blocks.
      - name: Trivy image scan
        uses: aquasecurity/trivy-action@a9c7b0f06e461e9d4b4d1711f154ee024b8d7ab8 # v0.36.0
        with:
          image-ref: dapr-go-${{ matrix.name }}:scan
          scanners: 'vuln,secret,misconfig'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'
          ignore-unfixed: true

      # GATE 3: Smoke test — pattern depends on whether the service uses the Dapr SDK.
      # subscriber boots cleanly without a sidecar (no SDK calls); the Dapr-using
      # services exit fast without :50001, so we verify container shape instead.
      - name: Smoke test
        run: |
          set -euo pipefail
          SVC='${{ matrix.name }}'
          IMG="dapr-go-${SVC}:scan"
          case "${SVC}" in
            subscriber)
              docker run -d --name "${SVC}-smoke" "${IMG}"
              end=$((SECONDS + 30))
              while [ "${SECONDS}" -lt "${end}" ]; do
                if docker logs "${SVC}-smoke" 2>&1 | grep -qE 'Starting Subscriber in Port'; then
                  echo "PASS: ${SVC} boot marker observed"
                  exit 0
                fi
                sleep 2
              done
              echo "FAIL: ${SVC} did not print boot marker within 30s"
              docker logs "${SVC}-smoke"
              exit 1
              ;;
            *)
              docker run --rm --entrypoint /bin/sh "${IMG}" -c '
                set -e
                [ -x /app/main ] || { echo "FAIL: /app/main not executable"; ls -la /app/; exit 1; }
                [ "$(stat -c %U /app/main)" = "app" ] || { echo "FAIL: /app/main not owned by app:app"; stat /app/main; exit 1; }
                [ "$(id -u)" = "10001" ] || { echo "FAIL: runtime UID is $(id -u), expected 10001"; exit 1; }
                echo "PASS: container shape OK (UID 10001, /app/main owned by app, executable)"
              '
              ;;
          esac

      - name: Cleanup smoke container
        if: always()
        run: docker rm -f ${{ matrix.name }}-smoke 2>/dev/null || true

      - name: Log in to GHCR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # All gates passed → publish multi-arch (provenance: false + sbom: false
      # keeps the image index free of unknown/unknown entries so GHCR's
      # Packages UI renders the "OS / Arch" tab). Cosign signing below
      # provides Sigstore supply-chain verification.
      - name: Build and push
        id: push
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: ./${{ matrix.dir }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: false
          sbom: false
          # Bust the `apk --no-cache upgrade` layer per run so published
          # images carry the latest alpine:3.23 security patches.
          build-args: |
            APK_UPGRADE_BUST=${{ github.run_id }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - uses: sigstore/cosign-installer@cad07c2e89fa2edd6e2d7bab4c1aa38e53f76003 # v4.1.1

      - name: Sign image with cosign
        env:
          TAGS: ${{ steps.meta.outputs.tags }}
          DIGEST: ${{ steps.push.outputs.digest }}
        run: |
          set -euo pipefail
          while IFS= read -r tag; do
            [ -z "${tag}" ] && continue
            echo "→ cosign sign ${tag}@${DIGEST}"
            cosign sign --yes "${tag}@${DIGEST}"
          done <<< "${TAGS}"

  ci-pass:
    if: always()
    needs: [changes, static-check, build, test, integration-test, e2e, image-test, docker]
    runs-on: ubuntu-latest
    timeout-minutes: 1
    steps:
      - name: Verify all upstream jobs succeeded or were skipped
        run: |
          if [[ "${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}" == "true" ]]; then
            echo "One or more required jobs failed or were cancelled"
            exit 1
          fi
          echo "All required jobs passed or were skipped"
