apiVersion: dapr.io/v1alpha1
kind: Component
metadata:
  name: statestore
spec:
  type: state.redis
  version: v1
  metadata:
    # https://docs.dapr.io/operations/components/component-secrets
    - name: redisHost
      value: "redis-master.dapr-go.svc.cluster.local:6379"
    - name: redisPassword
      secretKeyRef:
        name: redis-password-secret
        key: redis-password
    # Disable the default `appid` key prefix so write-values (app-id
    # write-values) and read-values (app-id read-values) share the same
    # `values` key — the project's data model is a single shared list.
    - name: keyPrefix
      value: none
auth:
  secretStore: kubernetes
