apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontendsvc
  labels:
    app: frontendsvc
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontendsvc
  template:
    metadata:
      labels:
        app: frontendsvc
      annotations:
        dapr.io/enabled: "true"
        dapr.io/app-id: "frontendsvc"
        dapr.io/app-port: "8080"
        dapr.io/log-level: "debug"
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: frontendsvc
          image: ghcr.io/andriykalashnykov/dapr-go/frontendsvc:0.1.0
          ports:
            - containerPort: 8080
          env:
            - name: APP_PORT
              value: "8080"
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            runAsUser: 10001
            capabilities:
              drop: ["ALL"]
            readOnlyRootFilesystem: true
            seccompProfile:
              type: RuntimeDefault
          resources:
            requests:
              cpu: "25m"
              memory: "32Mi"
            limits:
              cpu: "250m"
              memory: "128Mi"
          startupProbe:
            httpGet:
              path: /health/readiness
              port: 8080
            periodSeconds: 3
            failureThreshold: 40
          readinessProbe:
            httpGet:
              path: /health/readiness
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health/liveness
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 20
          imagePullPolicy: IfNotPresent
---
apiVersion: v1
kind: Service
metadata:
  name: frontend-svc
spec:
  selector:
    app: frontendsvc
  ports:
    - port: 8080
      targetPort: 8080
  type: LoadBalancer