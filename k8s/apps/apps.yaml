apiVersion: apps/v1
kind: Deployment
metadata:
  name: read-values
spec:
  replicas: 1
  selector:
    matchLabels:
      app: read-values
  template:
    metadata:
      labels:
        app: read-values
      annotations:
        dapr.io/enabled: "true"
        dapr.io/app-id: "read-values"
        dapr.io/app-port: "8080"
        dapr.io/log-level: "debug"
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: read-values
          image: ghcr.io/andriykalashnykov/dapr-go/read-values:0.1.0
          env:
            - name: DAPR_PORT
              value: "50001"
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            runAsUser: 10001
            capabilities:
              drop: ["ALL"]
            readOnlyRootFilesystem: true
            seccompProfile:
              type: RuntimeDefault
          resources:
            requests:
              memory: "32Mi"
              cpu: "25m"
            limits:
              memory: "128Mi"
              cpu: "500m"
          ports:
            - containerPort: 8080
          startupProbe:
            httpGet:
              path: /health/readiness
              port: 8080
            periodSeconds: 3
            failureThreshold: 40
          readinessProbe:
            httpGet:
              path: /health/readiness
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health/liveness
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 20
          imagePullPolicy: IfNotPresent
---
apiVersion: v1
kind: Service
metadata:
  name: read-values-svc
spec:
  selector:
    app: read-values
  ports:
    - port: 80
      targetPort: 8080
  type: LoadBalancer
---
